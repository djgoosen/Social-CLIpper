# Runs tests only when repository variable CI is set to "true"
# (Settings → Secrets and variables → Actions → Variables → CI).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    if: vars.CI == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: python -m pip install -U pip setuptools wheel && python -m pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check social_clipr tests

      - name: Pylint
        run: pylint social_clipr

  test:
    if: vars.CI == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install FFmpeg (subtitles / libass for render tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          ffmpeg -hide_banner -version

      - name: Install package and dev dependencies
        run: python -m pip install -U pip setuptools wheel && python -m pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          python -m pytest -q \
            --cov=social_clipr \
            --cov-fail-under=100 \
            --cov-report=xml \
            --cov-report=term

      # Public repos: often works without a token. If uploads fail, add CODECOV_TOKEN
      # from https://app.codecov.io → repo → Settings → General.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: python-${{ matrix.python-version }}
          name: python-${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
